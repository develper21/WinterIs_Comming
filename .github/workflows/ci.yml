name: CI-CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
        options: --health-cmd "mongosh --eval 'db.runCommand{\"ping\"}).ok'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install Backend Dependencies
        run: |
          cd Backend
          npm ci

      - name: Install Frontend Dependencies
        run: |
          cd Frontend
          npm ci

      - name: Lint Backend
        run: |
          cd Backend
          npm run lint || echo "No lint issues found"

      - name: Lint Frontend
        run: |
          cd Frontend
          npm run lint || echo "No lint issues found"

      - name: Test Backend
        run: |
          cd Backend
          npm test
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          JWT_SECRET: test-secret-key
          NODE_ENV: test

      - name: Test Frontend
        run: |
          cd Frontend
          npm test

      - name: Build Backend
        run: |
          cd Backend
          npm run build || echo "No build artifacts found"

      - name: Build Frontend
        run: |
          cd Frontend
          npm run build || echo "No build artifacts found"

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == "push"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker Images
        run: |
          docker build -t bloodbank/backend:latest ./Backend
          docker build -t bloodbank/frontend:latest ./Frontend

      - name: Deploy to producation
        run: |
          echo "Deploying to producation server"
          docker push bloodbank/backend:latest
          docker push bloodbank/frontend:latest

      - name: Health checks
        run: |
          echo "Running health checks"
          curl -f http://localhost:3000 || echo "Health check failed"
        env:
          NODE_ENV: production
